<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>N.E.X.U.S.: Neural Extension for X-scale Upgrade Software</title>
    <style>
        :root {
            --bg-color: #050508;
            --primary: #00f2ff;
            --secondary: #7000ff;
            --enemy: #ff0055;
            --xp: #ccff00;
            --text: #ffffff;
            --boss: #ffcc00;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #101018 0%, #050508 100%);
        }

        canvas { display: block; }

        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            z-index: 10;
            width: calc(100% - 40px);
        }

        .bar-container {
            width: 250px;
            height: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 5px;
            margin-bottom: 6px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        #hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0055, #ff4488); transition: width 0.2s; }
        #xp-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ccff00, #eeff88); transition: width 0.3s; }

        .stats {
            color: var(--text);
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        #level-up-modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(5, 5, 10, 0.95);
            padding: 30px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            display: none;
            flex-direction: column;
            gap: 15px;
            z-index: 100;
            min-width: 300px;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .upgrade-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 15px;
            border-radius: 12px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
            color: white;
        }

        .upgrade-card:hover {
            background: rgba(0, 242, 255, 0.1);
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 242, 255, 0.1);
        }

        .upgrade-card h3 { margin: 0 0 5px 0; color: var(--primary); font-size: 16px; }
        .upgrade-card p { margin: 0; font-size: 12px; opacity: 0.7; }

        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            display: none;
            z-index: 200;
        }

        button {
            padding: 15px 40px;
            font-size: 16px;
            background: var(--primary);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: #000;
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }

        #joystick-base {
            position: absolute;
            bottom: 50px;
            left: 50px;
            width: 100px;
            height: 100px;
            background: rgba(255,255,255,0.05);
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            display: none;
            z-index: 5;
        }
        #joystick-stick {
            position: absolute;
            top: 25px;
            left: 25px;
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            box-shadow: 0 0 15px var(--primary);
        }

        #damage-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: red;
            pointer-events: none;
            opacity: 0;
            z-index: 1000;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="damage-flash"></div>
        <canvas id="gameCanvas"></canvas>

        <div id="hud">
            <div class="bar-container"><div id="hp-bar"></div></div>
            <div class="bar-container"><div id="xp-bar"></div></div>
            <div class="stats">
                <span>LVL <span id="lvl-val">1</span></span>
                <span>KILLS <span id="kill-val">0</span></span>
            </div>
        </div>

        <div id="level-up-modal">
            <h2 style="color: white; margin: 0 0 10px 0; text-align: center; letter-spacing: 3px;">EVOLUÇÃO</h2>
            <div id="upgrade-options"></div>
        </div>

        <div id="game-over">
            <h1 style="font-size: 60px; color: var(--enemy); margin-bottom: 10px; text-shadow: 0 0 20px rgba(255,0,85,0.5);">TERMINATED</h1>
            <p id="final-stats" style="font-size: 18px; opacity: 0.8;"></p>
            <button onclick="location.reload()">REBOOT SYSTEM</button>
        </div>

        <div id="joystick-base">
            <div id="joystick-stick"></div>
        </div>
    </div>

<script>
/**
 * NEON ENGINE CORE & MOD API
 */
const NeonEngine = {
    Registry: {
        enemies: {}, items: {}, skills: {}, projectiles: {}, 
        bosses: {}, commands: {}, particles: {}, ui: {}
    },
    Mods: new Map(),
    Events: {
        listeners: {},
        on(event, callback) {
            if (!this.listeners[event]) this.listeners[event] = [];
            this.listeners[event].push(callback);
        },
        emit(event, data) {
            if (this.listeners[event]) this.listeners[event].forEach(cb => cb(data));
        }
    },
    patch(obj, name, newFunc) {
        const old = obj[name];
        obj[name] = function(...args) { return newFunc.apply(this, [old.bind(this), ...args]); };
    },
    Storage: {
        save(key, val) { localStorage.setItem(`neon_${key}`, JSON.stringify(val)); },
        get(key) { return JSON.parse(localStorage.getItem(`neon_${key}`)); }
    }
};

window.ModAPI = {
    registerEnemy: (id, config) => NeonEngine.Registry.enemies[id] = config,
    registerSkill: (id, config) => NeonEngine.Registry.skills[id] = config,
    registerCommand: (name, callback) => NeonEngine.Registry.commands[name] = callback,
    addEvent: (ev, cb) => NeonEngine.Events.on(ev, cb),
    spawnParticle: (x, y, color, count) => createParticles(x, y, color, count, 3),
    log: (modId, msg) => console.log(`[${modId}] ${msg}`),
    patchPlayer: (prop, func) => NeonEngine.patch(player, prop, func),
    getGameState: () => ({ player, enemies, gameTime, gameActive }),
    addHUDElement: (html) => {
        const div = document.createElement('div');
        div.innerHTML = html;
        document.getElementById('hud').appendChild(div);
    }
};
</script>

<script>
const ModLoader = {
    async loadMod(url) {
        try {
            const script = document.createElement('script');
            script.src = url;
            script.type = 'text/javascript';
            document.head.appendChild(script);
            
            return new Promise((resolve) => {
                script.onload = () => {
                    NeonEngine.Events.emit('modLoaded', { url });
                    resolve(true);
                };
            });
        } catch (e) {
            console.error("Erro ao carregar mod:", url, e);
        }
    },
    executeCommand(input) {
        const args = input.split(' ');
        const cmd = args.shift().replace('/', '');
        if (NeonEngine.Registry.commands[cmd]) {
            NeonEngine.Registry.commands[cmd](args);
        } else {
            console.warn("Comando desconhecido.");
        }
    }
};

window.addEventListener('keydown', (e) => {
    if (e.key === '/') {
        const cmd = prompt("NEON CONSOLE:");
        if (cmd) ModLoader.executeCommand(cmd);
    }
});
</script>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const hpBar = document.getElementById('hp-bar');
const xpBar = document.getElementById('xp-bar');
const lvlVal = document.getElementById('lvl-val');
const killVal = document.getElementById('kill-val');
const levelUpModal = document.getElementById('level-up-modal');
const upgradeOptionsContainer = document.getElementById('upgrade-options');
const gameOverScreen = document.getElementById('game-over');
const damageFlash = document.getElementById('damage-flash');

let width, height;
let lastTime = 0;
let gameActive = true;
let isPaused = false;
let gameTime = 0;
let gridOffset = 0;

const player = {
    x: 0, y: 0,
    radius: 18,
    speed: 220,
    maxHp: 100,
    hp: 100,
    level: 0,
    xp: 0,
    xpToNext: 50,
    kills: 0,
    damage: 25,
    attackSpeed: 900,
    lastAttack: 0,
    projectiles: 1,
    areaScale: 1,
    regen: 0.5,
    shield: 0,
    shieldMax: 0,
    isDashing: false,
    dashCooldown: 0,
    angle: 0,
    upgradesOwned: { shock: 0, vortex: 0, shield: 0, wings: 0, prism: 0, ricochet: 0, luck: 0, turret: 0 }
};

let enemies = [];
let projectiles = [];
let enemyProjectiles = [];
let particles = [];
let pickups = [];
let keys = {};
let joystick = { active: false, startX: 0, startY: 0, vectorX: 0, vectorY: 0 };

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSfx(freq, type, duration, vol = 0.1) {
    try {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        osc.connect(g);
        g.connect(audioCtx.destination);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    } catch(e) {}
}

class Projectile {
    constructor(x, y, vx, vy, color = '#00f2ff') {
        this.x = x; this.y = y;
        this.vx = vx; this.vy = vy;
        this.radius = 4 * player.areaScale;
        this.color = color;
        this.history = [];
    }
    update(dt) {
        this.history.unshift({x: this.x, y: this.y});
        if(this.history.length > 5) this.history.pop();
        this.x += this.vx * dt;
        this.y += this.vy * dt;
    }
    draw() {
        this.history.forEach((pos, i) => {
            ctx.globalAlpha = 0.5 - (i * 0.1);
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, this.radius * (1 - i/6), 0, Math.PI*2);
            ctx.fill();
        });
        ctx.globalAlpha = 1;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillStyle = "#fff";
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

class Enemy {
    constructor(x, y, type) {
        this.x = x; this.y = y;
        this.type = type;
        this.hp = 40;
        this.maxHp = 40;
        this.speed = 80;
        this.radius = 15;
        this.color = '#ff0055';
        this.hitTimer = 0;
        this.animPhase = Math.random() * Math.PI * 2;
        
        if(type === 'fast') {
            this.speed = 170; this.hp = 20; this.color = '#00ff88'; this.radius = 12;
        } else if(type === 'tank') {
            this.speed = 50; this.hp = 180; this.color = '#7000ff'; this.radius = 25;
        } else if(type === 'shooter') {
            this.speed = 70; this.hp = 50; this.color = '#ff00ff'; this.lastShot = 0;
        } else if(type === 'boss') {
            this.speed = 60; this.hp = 2000; this.maxHp = 2000; this.radius = 50;
            this.color = '#ffcc00'; this.isBoss = true; this.lastShot = 0;
        }
    }

    update(dt) {
        if(this.hitTimer > 0) this.hitTimer -= dt;
        const dx = player.x - this.x;
        const dy = player.y - this.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        let moveX = (dx/dist);
        let moveY = (dy/dist);

        if(this.type === 'shooter' && dist < 300) {
            moveX *= -0.5; moveY *= -0.5;
            if(Date.now() - this.lastShot > 2000) this.shoot(dx, dy, dist);
        } else if(this.isBoss) {
            if(Date.now() - this.lastShot > 1500) this.bossAttack();
        }

        const currentSpeed = this.hitTimer > 0 ? -this.speed : this.speed;
        this.x += moveX * currentSpeed * dt;
        this.y += moveY * currentSpeed * dt;

        if(dist < this.radius + player.radius) takeDamage(0.3); 
    }

    shoot(dx, dy, dist) {
        this.lastShot = Date.now();
        enemyProjectiles.push(new Projectile(this.x, this.y, (dx/dist)*300, (dy/dist)*300, '#ff00ff'));
    }

    bossAttack() {
        this.lastShot = Date.now();
        playSfx(100, 'sawtooth', 0.2);
        for(let i=0; i<8; i++) {
            const a = (Math.PI*2/8)*i + (gameTime);
            enemyProjectiles.push(new Projectile(this.x, this.y, Math.cos(a)*250, Math.sin(a)*250, '#ffcc00'));
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        const scale = 1 + Math.sin(gameTime * 10 + this.animPhase) * 0.05;
        ctx.scale(scale, scale);
        ctx.fillStyle = this.hitTimer > 0 ? "#fff" : this.color;
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.beginPath();
        if(this.type === 'fast') {
            ctx.moveTo(0, -this.radius); ctx.lineTo(this.radius, this.radius); ctx.lineTo(-this.radius, this.radius);
        } else if(this.type === 'tank') {
            ctx.rect(-this.radius, -this.radius, this.radius*2, this.radius*2);
        } else if(this.isBoss) {
            ctx.arc(0, 0, this.radius, 0, Math.PI*2);
            ctx.strokeRect(-this.radius-10, -this.radius-10, (this.radius+10)*2, (this.radius+10)*2);
        } else {
            for(let i=0; i<6; i++) {
                const a = i * Math.PI / 3;
                ctx.lineTo(Math.cos(a)*this.radius, Math.sin(a)*this.radius);
            }
        }
        ctx.fill();
        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color, size = 3) {
        this.x = x; this.y = y;
        this.color = color;
        this.vx = (Math.random()-0.5) * 400;
        this.vy = (Math.random()-0.5) * 400;
        this.life = 1.0;
        this.size = size;
    }
    update(dt) {
        this.x += this.vx * dt;
        this.y += this.vy * dt;
        this.life -= dt * 2;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.shadowBlur = 5;
        ctx.shadowColor = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

class Pickup {
    constructor(x, y, type) {
        this.x = x; this.y = y; this.type = type;
        this.radius = 10;
    }
    draw() {
        const glow = Math.abs(Math.sin(gameTime*5)) * 15;
        ctx.shadowBlur = glow;
        ctx.fillStyle = this.type === 'hp' ? '#ff0055' : (this.type === 'shield' ? '#00f2ff' : '#ccff00');
        ctx.shadowColor = ctx.fillStyle;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.shadowBlur = 0;
    }
}

function init() {
    resize();
    player.x = width/2; player.y = height/2;
    window.addEventListener('resize', resize);
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);
    canvas.addEventListener('touchstart', handleTouch, {passive:false});
    canvas.addEventListener('touchmove', handleTouch, {passive:false});
    canvas.addEventListener('touchend', () => {
        joystick.active = false;
        document.getElementById('joystick-base').style.display = 'none';
    });
    requestAnimationFrame(gameLoop);
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}

function takeDamage(amt) {
    if(player.isDashing) return;
    if(player.shield > 0) {
        player.shield -= amt * 2;
        NeonEngine.Events.emit('playerDamage', { amount: amt, shielded: true });
        return;
    }
    player.hp -= amt;
    NeonEngine.Events.emit('playerDamage', { amount: amt, shielded: false });
    damageFlash.style.opacity = '0.3';
    setTimeout(() => damageFlash.style.opacity = '0', 50);
    if(player.hp <= 0 && gameActive) endGame();
}

function spawnEnemy() {
    if(isPaused || !gameActive) return;
    const side = Math.floor(Math.random()*4);
    let x, y;
    if(side === 0) { x = Math.random()*width; y = -50; }
    else if(side === 1) { x = width+50; y = Math.random()*height; }
    else if(side === 2) { x = Math.random()*width; y = height+50; }
    else { x = -50; y = Math.random()*height; }

    let type = 'basic';
    const r = Math.random();
    if(player.kills > 150 && r < 0.05) type = 'boss';
    else if(player.kills > 80 && r < 0.15) type = 'tank';
    else if(player.kills > 40 && r < 0.20) type = 'shooter';
    else if(player.kills > 20 && r < 0.30) type = 'fast';
    if(type === 'boss' && enemies.some(e => e.isBoss)) type = 'tank';
    enemies.push(new Enemy(x, y, type));
}

function autoAttack() {
    const now = Date.now();
    if(now - player.lastAttack > player.attackSpeed) {
        let nearest = null;
        let minDist = 500;
        enemies.forEach(e => {
            const d = Math.sqrt((e.x - player.x)**2 + (e.y - player.y)**2);
            if(d < minDist) { minDist = d; nearest = e; }
        });
        if(nearest) {
            playSfx(400, 'sine', 0.1, 0.05);
            for(let i=0; i<player.projectiles; i++) {
                const angle = Math.atan2(nearest.y - player.y, nearest.x - player.x) + (i - (player.projectiles-1)/2)*0.15;
                projectiles.push(new Projectile(player.x, player.y, Math.cos(angle)*600, Math.sin(angle)*600));
            }
            player.lastAttack = now;
        }
    }
}

// --- TRECHO CORRIGIDO DA FUNÇÃO UPDATE (Script Principal) ---

function update(dt) {
    if(isPaused || !gameActive) return;
    gameTime += dt;
    gridOffset = (gridOffset + dt * 20) % 50;
    NeonEngine.Events.emit('gameTick', { dt, gameTime });

    let mx = 0, my = 0;
    if(keys['KeyW'] || keys['ArrowUp']) my -= 1;
    if(keys['KeyS'] || keys['ArrowDown']) my += 1;
    if(keys['KeyA'] || keys['ArrowLeft']) mx -= 1;
    if(keys['KeyD'] || keys['ArrowRight']) mx += 1;
    if(joystick.active) { mx = joystick.vectorX; my = joystick.vectorY; }
    
    if(mx !== 0 || my !== 0) {
        const mag = Math.sqrt(mx*mx + my*my);
        player.x += (mx/mag) * player.speed * dt;
        player.y += (my/mag) * player.speed * dt;
        player.angle = Math.atan2(my, mx);
    }

    player.x = Math.max(player.radius, Math.min(width-player.radius, player.x));
    player.y = Math.max(player.radius, Math.min(height-player.radius, player.y));
    player.hp = Math.min(player.maxHp, player.hp + player.regen * dt);

    autoAttack();

    // 1. Processamento de Projéteis
    projectiles.forEach((p, i) => {
        p.update(dt);
        if(p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
            projectiles.splice(i, 1);
        } else {
            enemies.forEach((e) => {
                const d = Math.sqrt((p.x - e.x)**2 + (p.y - e.y)**2);
                if(d < p.radius + e.radius) {
                    e.hp -= player.damage;
                    e.hitTimer = 0.1;
                    if(!player.prismActive) projectiles.splice(i, 1);
                }
            });
        }
    });

    // 2. Processamento de Inimigos e Check de Morte Unificado
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
        const e = enemies[ei];
        e.update(dt);

        if (e.hp <= 0) {
            // Drop de Partículas e Som
            if (Math.random() < 0.3) playSfx(150, 'square', 0.1);
            createParticles(e.x, e.y, e.color, e.isBoss ? 40 : 15, 3);
            
            // Lógica de Expansão (Black Hole / Sorte) disparada antes de sumir
            if (player.upgradesOwned.vortex > 0) {
                enemies.forEach(other => {
                    const d = Math.sqrt((other.x - e.x)**2 + (other.y - e.y)**2);
                    if (d < 160 + (player.upgradesOwned.vortex * 20)) {
                        const a = Math.atan2(e.y - other.y, e.x - other.x);
                        other.x += Math.cos(a) * (60 * player.upgradesOwned.vortex) * dt;
                        other.y += Math.sin(a) * (60 * player.upgradesOwned.vortex) * dt;
                        other.hp -= 0.15 * player.upgradesOwned.vortex;
                    }
                });
            }

            if (player.upgradesOwned.luck > 0 && Math.random() < (0.12 * player.upgradesOwned.luck)) {
                pickups.push(new Pickup(e.x + 8, e.y, 'hp'));
                pickups.push(new Pickup(e.x - 8, e.y, 'xp'));
            } else if (Math.random() < 0.15) {
                pickups.push(new Pickup(e.x, e.y, Math.random() < 0.3 ? 'hp' : 'xp'));
            }

            // Registro da Kill e Remoção
            player.kills++;
            player.xp += e.isBoss ? 500 : 20;
            enemies.splice(ei, 1);
            checkLevelUp();
        }
    }

    // 3. Outras Entidades
    enemyProjectiles.forEach((p, i) => {
        p.update(dt);
        const d = Math.sqrt((p.x - player.x)**2 + (p.y - player.y)**2);
        if(d < p.radius + player.radius) {
            takeDamage(10);
            enemyProjectiles.splice(i, 1);
        }
    });

    particles.forEach((p, i) => {
        p.update(dt);
        if(p.life <= 0) particles.splice(i, 1);
    });

    if(Math.random() < 0.02 + (player.kills * 0.0001)) spawnEnemy();
    updateHUD();
}

function draw() {
    ctx.clearRect(0, 0, width, height);
    ctx.strokeStyle = 'rgba(0, 242, 255, 0.05)';
    for(let x = gridOffset; x < width; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, height); ctx.stroke(); }
    for(let y = gridOffset; y < height; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(width, y); ctx.stroke(); }

    pickups.forEach(p => p.draw());
    projectiles.forEach(p => p.draw());
    enemyProjectiles.forEach(p => p.draw());
    enemies.forEach(e => e.draw());
    particles.forEach(p => p.draw());

    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.shadowBlur = 10 + Math.abs(Math.sin(gameTime*3)) * 20;
    ctx.shadowColor = varToColor('--primary');
    ctx.fillStyle = varToColor('--primary');
    ctx.beginPath();
    ctx.moveTo(player.radius, 0);
    ctx.lineTo(-player.radius, player.radius*0.8);
    ctx.lineTo(-player.radius*0.5, 0);
    ctx.lineTo(-player.radius, -player.radius*0.8);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
}

function gameLoop(time) {
    const dt = Math.min((time - lastTime) / 1000, 0.1);
    lastTime = time;
    update(dt);
    draw();
    if(gameActive) requestAnimationFrame(gameLoop);
}

const upgradeList = [
    { n: 'OVERCLOCK', d: 'Dano +40%', f: () => player.damage *= 1.4 },
    { n: 'TURBO', d: 'Velocidade +25%', f: () => player.speed *= 1.25 },
    { n: 'RAPID FIRE', d: 'Velocidade de Ataque +25%', f: () => player.attackSpeed *= 0.75 },
    { n: 'SPLIT SHOT', d: '+1 Projétil', f: () => player.projectiles++ },
    { n: 'EXPANSION', d: 'Área de Impacto +30%', f: () => player.areaScale += 0.5 },
    { n: 'REGEN', d: 'Reparo automático', f: () => player.regen += 2 }
];

function checkLevelUp() {
    if(player.xp >= player.xpToNext) {
        player.xp -= player.xpToNext;
        player.level++;
        player.xpToNext *= 1.4;
        showUpgradeMenu();
    }
}

function showUpgradeMenu() {
    isPaused = true;
    levelUpModal.style.display = 'flex';
    upgradeOptionsContainer.innerHTML = '';
    const choices = [...upgradeList].sort(() => 0.5 - Math.random()).slice(0, 3);
    choices.forEach(upg => {
        const div = document.createElement('div');
        div.className = 'upgrade-card';
        div.innerHTML = `<h3>${upg.n}</h3><p>${upg.d}</p>`;
        div.onclick = () => { upg.f(); isPaused = false; levelUpModal.style.display = 'none'; };
        upgradeOptionsContainer.appendChild(div);
    });
}

function createParticles(x, y, color, count, size) {
    for(let i=0; i<count; i++) particles.push(new Particle(x, y, color, size));
}

function varToColor(v) { return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

function updateHUD() {
    hpBar.style.width = `${(player.hp / player.maxHp) * 100}%`;
    xpBar.style.width = `${(player.xp / player.xpToNext) * 100}%`;
    lvlVal.innerText = player.level;
    killVal.innerText = player.kills;
}

function handleTouch(e) {
    e.preventDefault();
    const t = e.touches[0];
    const base = document.getElementById('joystick-base');
    if(!joystick.active) {
        joystick.active = true;
        joystick.startX = t.clientX; joystick.startY = t.clientY;
        base.style.display = 'block';
        base.style.left = `${t.clientX - 50}px`; base.style.top = `${t.clientY - 50}px`;
    }
    const dx = t.clientX - joystick.startX;
    const dy = t.clientY - joystick.startY;
    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
    const angle = Math.atan2(dy, dx);
    joystick.vectorX = Math.cos(angle) * (dist/50);
    joystick.vectorY = Math.sin(angle) * (dist/50);
    document.getElementById('joystick-stick').style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
}

function endGame() {
    gameActive = false;
    gameOverScreen.style.display = 'block';
    document.getElementById('final-stats').innerText = `SYSTEM LEVEL: ${player.level} | DATA COLLECTED: ${player.kills} KILLS`;
}

init();
</script>

<script>
/**
 * NUCLEO DE EXPANSÃO UNIFICADO - NEON SURVIVOR ULTRA
 */
(function() {
    let shockTarget = null;
    let shockDamageScale = 1;
    let turrets = [];
    let shieldTimer = 0;
    let lastLevelEvent = 0;

    const newUpgrades = [
        { n: 'ELECTRO-SHOCK', d: 'Raio que aumenta o dano quanto mais foca no alvo', f: () => {
            player.upgradesOwned.shock++;
            player.hasShock = true;
            player.shockRange = (player.shockRange || 130) + 15;
        }},
        { n: 'BLACK HOLE', d: 'Ao matar, puxa inimigos e dá dano em área', f: () => { 
            player.upgradesOwned.vortex++;
            player.hasVortex = true; 
        }},
        { n: 'NANO-SHIELD', d: 'Recarrega e defende +vida', f: () => { 
            player.upgradesOwned.shield++;
            player.shieldMax += 25; 
            player.shield = player.shieldMax; 
        }},
        { n: 'NEON WINGS', d: 'Rastro de luz ofensivo e explosões', f: () => { 
            player.upgradesOwned.wings++;
            player.hasWings = true; 
        }},
        { n: 'PRISM BLAST', d: 'Tiro arco-íris que atravessa inimigos', f: () => { 
            player.upgradesOwned.prism++;
            player.prismActive = true;
        }},
        { n: 'SENTINELA NEON', d: 'Invoca torreta automática', f: () => { 
            player.upgradesOwned.turret++;
            spawnTurret();
        }},
        { n: 'RICOCHETE', d: 'Projéteis quicam nas bordas', f: () => { 
            player.upgradesOwned.ricochet++;
        }},
        { n: 'SORTE NEON', d: 'Chance de drop duplo', f: () => { 
            player.upgradesOwned.luck++;
        }}
    ];
    upgradeList.push(...newUpgrades);

    function spawnMegaBoss() {
        const boss = new Enemy(width/2, -100, 'boss');
        boss.hp = 6000; boss.maxHp = 6000;
        boss.radius = 80; boss.color = "#ffcc00";
        boss.isUltraBoss = true;
        enemies.push(boss);
    }

    function spawnTurret() {
        turrets.push({
            x: player.x + (Math.random() - 0.5) * 120,
            y: player.y + (Math.random() - 0.5) * 120,
            hp: 100 + (player.upgradesOwned.turret * 60),
            maxHp: 50 + (player.upgradesOwned.turret * 60),
            lastShot: 10, range: 200, radius: 10
        });
    }

    const originalUpdate = window.update;
    window.update = function(dt) {
        originalUpdate(dt);
        if (!gameActive || isPaused) return;

        if (player.level % 10 === 0 && player.level !== lastLevelEvent && player.level > 0) {
            lastLevelEvent = player.level;
            if (player.level === 30) spawnMegaBoss();
        }

        if (player.upgradesOwned.ricochet > 0) {
            projectiles.forEach(p => {
                if (!p.bounces) p.bounces = 0;
                if (p.bounces < player.upgradesOwned.ricochet) {
                    if (p.x <= 0 || p.x >= width) { p.vx *= -1; p.bounces++; }
                    if (p.y <= 0 || p.y >= height) { p.vy *= -1; p.bounces++; }
                }
            });
        }

        if (player.hasShock) {
            let closest = null; let minDist = player.shockRange || 130;
            enemies.forEach(e => {
                const d = Math.sqrt((e.x - player.x)**2 + (e.y - player.y)**2);
                if (d < minDist) { minDist = d; closest = e; }
            });
            if (closest) {
                if (shockTarget === closest) {
                    shockDamageScale += dt * 2.5 * player.upgradesOwned.shock;
                    closest.hp -= 0.6 * shockDamageScale;
                } else { shockTarget = closest; shockDamageScale = 1; }
            } else { shockTarget = null; shockDamageScale = 1; }
        }

        turrets.forEach((t, ti) => {
            let target = null; let dMin = t.range;
            enemies.forEach(e => {
                const d = Math.sqrt((e.x - t.x)**2 + (e.y - t.y)**2);
                if (d < dMin) { dMin = d; target = e; }
            });
            if (target && gameTime - t.lastShot > 0.4 / player.upgradesOwned.turret) {
                const a = Math.atan2(target.y - t.y, target.x - t.x);
                projectiles.push(new Projectile(t.x, t.y, Math.cos(a)*500, Math.sin(a)*500, '#eeff00'));
                t.lastShot = gameTime;
            }
            if (t.hp <= 0) turrets.splice(ti, 1);
        });

        enemies.forEach((e, ei) => {
            if (e.hp <= 0) {
                if (player.upgradesOwned.vortex > 0) {
                    enemies.forEach(other => {
                        const d = Math.sqrt((other.x-e.x)**2 + (other.y-e.y)**2);
                        if (d < 160 + (player.upgradesOwned.vortex * 20)) {
                            const a = Math.atan2(e.y - other.y, e.x - other.x);
                            other.x += Math.cos(a) * (60 * player.upgradesOwned.vortex) * dt;
                            other.y += Math.sin(a) * (60 * player.upgradesOwned.vortex) * dt;
                            other.hp -= 0.15 * player.upgradesOwned.vortex;
                        }
                    });
                }
                if (player.upgradesOwned.luck > 0 && Math.random() < (0.12 * player.upgradesOwned.luck)) {
                    pickups.push(new Pickup(e.x + 8, e.y, 'hp'));
                    pickups.push(new Pickup(e.x - 8, e.y, 'xp'));
                }
            }
        });
    };

    const originalDraw = window.draw;
    window.draw = function() {
        originalDraw();
        if (!gameActive) return;

        turrets.forEach(t => {
            ctx.fillStyle = "#eeff00"; ctx.fillRect(t.x - 12, t.y - 12, 24, 24);
        });

        if (shockTarget && player.hasShock) {
            ctx.strokeStyle = "#00f2ff";
            ctx.lineWidth = Math.min(2 + shockDamageScale/2, 12);
            ctx.beginPath(); ctx.moveTo(player.x, player.y); ctx.lineTo(shockTarget.x, shockTarget.y); ctx.stroke();
        }
    };
})();

</script>
<script>
/**
 * SCRIPT DE CORREÇÃO: SISTEMA DE COLETA E AJUSTE DE EQUILÍBRIO (NERF)
 */
(function() {
    // 1. Lógica de Coleta de Itens (Pickups)
    // Usamos o evento 'gameTick' para checar a proximidade sem mexer no update original
    ModAPI.addEvent('gameTick', ({ dt }) => {
        const { player } = ModAPI.getGameState();
        
        for (let pi = pickups.length - 1; pi >= 0; pi--) {
            const p = pickups[pi];
            const dx = p.x - player.x;
            const dy = p.y - player.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            // Raio de coleta: raio do player + raio do item + margem de 10px
            if (dist < player.radius + p.radius + 10) {
                if (p.type === 'hp') {
                    player.hp = Math.min(player.maxHp, player.hp + 15);
                    playSfx(600, 'sine', 0.1);
                } else if (p.type === 'xp') {
                    player.xp += 25;
                    playSfx(800, 'sine', 0.05);
                }
                
                // Criar um pequeno brilho na coleta
                createParticles(p.x, p.y, p.type === 'hp' ? '#ff0055' : '#ccff00', 5, 2);
                
                pickups.splice(pi, 1);
                checkLevelUp();
            }
        }
    });

    // 2. Nerf da Sentinela Neon
    // Modificamos a função de disparo da sentinela através da ModAPI ou patch
    const originalSpawnTurret = window.spawnTurret;
    if (originalSpawnTurret) {
        window.spawnTurret = function() {
            // Chamamos a original para manter a funcionalidade
            originalSpawnTurret();
            
            // Aplicamos o nerf na última sentinela adicionada
            const lastTurret = turrets[turrets.length - 1];
            if (lastTurret) {
                // Aumentamos o delay entre tiros (multiplicador de lentidão)
                // Isso faz com que o '0.4' original no loop seja insuficiente
                lastTurret.nerfFactor = 2.0; 
            }
        };
    }

    // Nota: Como o loop da sentinela no seu código original usa 0.4 / upgrades,
    // para um nerf efetivo sem alterar o código anterior, 
    // injetamos uma redução de dano global para os projéteis amarelos:
    ModAPI.addEvent('gameTick', () => {
        projectiles.forEach(p => {
            if (p.color === '#eeff00' && !p.nerfed) {
                p.radius *= 0.8; // Projétil menor
                p.nerfed = true;
            }
        });
    });

    console.log("Neon Engine: Script de Coleta e Equilíbrio carregado com sucesso.");
})();
</script>

/**
 * NEON MOD LOADER BRIDGE
 * Este script conecta o Registry do NeonEngine com as mecânicas reais do jogo.
 */
(function() {
    // 1. Função para carregar mods via URL (Ex: carregarMod("meumod.js"))
    window.installMod = async function(url) {
        console.log(`%c [NeonLoader] Tentando instalar: ${url} `, 'background: #7000ff; color: #fff');
        return await ModLoader.loadMod(url);
    };

    // 2. Integração do Registro de Inimigos
    // Sobrescrevemos o spawn original para incluir inimigos registrados por mods
    const originalSpawnEnemy = window.spawnEnemy;
    window.spawnEnemy = function() {
        const modEnemies = Object.keys(NeonEngine.Registry.enemies);
        
        // Se houver inimigos de mods e a sorte ajudar (30% de chance), spawna um deles
        if (modEnemies.length > 0 && Math.random() < 0.3) {
            const side = Math.floor(Math.random()*4);
            let x, y;
            if(side === 0) { x = Math.random()*width; y = -50; }
            else if(side === 1) { x = width+50; y = Math.random()*height; }
            else if(side === 2) { x = Math.random()*width; y = height+50; }
            else { x = -50; y = Math.random()*height; }

            const randomTypeId = modEnemies[Math.floor(Math.random() * modEnemies.length)];
            const config = NeonEngine.Registry.enemies[randomTypeId];
            
            const newEnemy = new Enemy(x, y, 'basic'); // Base
            // Aplica as propriedades do Mod
            Object.assign(newEnemy, config);
            newEnemy.type = randomTypeId;
            enemies.push(newEnemy);
        } else {
            originalSpawnEnemy();
        }
    };

    // 3. Sistema de Hot-Reload de Upgrades
    // Garante que upgrades registrados via Mod apareçam no menu de evolução
    ModAPI.addEvent('modLoaded', () => {
        const skills = NeonEngine.Registry.skills;
        for (let id in skills) {
            if (!upgradeList.find(u => u.n === skills[id].n)) {
                upgradeList.push(skills[id]);
                console.log(`[NeonLoader] Novo upgrade injetado: ${skills[id].n}`);
            }
        }
    });

    console.log("%c [NeonEngine] Sistema de ponte para Mods ativado. Prontos para .js externos. ", 'color: #00f2ff; font-weight: bold;');
})();
</script>

            <div id="installed-mods-list">
                <p style="opacity:0.5; text-align:center;">Nenhum mod ativo para remover.</p>
            </div>
        </div>

        <div id="tab-3" class="mod-content">
            <div class="mod-card">
                <h3>Status do Motor</h3>
                <p id="engine-stats">Calculando...</p>
                <button class="mod-btn-action" style="background:#7000ff; color:#fff;" onclick="toggleHitboxes()">Ver Hitboxes (Debug)</button>
            </div>
        </div>
    `;
    document.body.appendChild(panel);

    const menuBtn = document.createElement('button');
    menuBtn.id = 'mod-menu-btn';
    menuBtn.innerText = 'HUB';
    document.body.appendChild(menuBtn);

    // 3. Lógica do Menu
    let activeMods = [];

    window.togglePanel = () => {
        panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
    };
    menuBtn.onclick = togglePanel;

    window.switchTab = (index) => {
        document.querySelectorAll('.mod-content').forEach((c, i) => {
            c.classList.toggle('active', i === index);
        });
        document.querySelectorAll('.tab-btn').forEach((b, i) => {
            if(i < 4) b.classList.toggle('active', i === index);
        });
    };

    // Função para registrar mod na lista de remoção
    function registerActiveMod(name, type) {
        activeMods.push({ id: Date.now(), name, type });
        updateModList();
    }

    function updateModList() {
        const container = document.getElementById('installed-mods-list');
        if(activeMods.length === 0) {
            container.innerHTML = `<p style="opacity:0.5; text-align:center;">Nenhum mod ativo.</p>`;
            return;
        }
        container.innerHTML = activeMods.map(m => `
            <div class="mod-card" style="display:flex; justify-content:space-between; align-items:center;">
                <div><strong>${m.name}</strong><br><small>${m.type}</small></div>
                <button class="mod-btn-danger" onclick="removeMod(${m.id})">REMOVER</button>
            </div>
        `).join('');
    }

    window.removeMod = (id) => {
        activeMods = activeMods.filter(m => m.id !== id);
        updateModList();
        alert("Atenção: A remoção limpa o registro, mas alguns efeitos de memória (como God Mode) podem exigir reinício.");
    };

    // 4. Funções de Carregamento (Arquivos e Texto)
    window.loadLocalFile = () => {
        const file = document.getElementById('file-input').files[0];
        if (!file) return alert("Selecione um arquivo!");
        
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                eval(e.target.result);
                registerActiveMod(file.name, "Arquivo Local");
                if(window.NeonCore) NeonCore.notify("Sucesso: " + file.name, "#00ff88");
            } catch(err) { alert("Erro no Script: " + err); }
        };
        reader.readAsText(file);
    };

    window.runEditorScript = () => {
        const code = document.getElementById('script-editor').value;
        if(!code) return;
        try {
            eval(code);
            registerActiveMod("Script Manual", "Texto/Editor");
            if(window.NeonCore) NeonCore.notify("Código Injetado!", "gold");
        } catch(err) { alert("Erro: " + err); }
    };

    window.loadFromUrl = async () => {
        const url = document.getElementById('mod-url-v2').value;
        const success = await ModLoader.loadMod(url);
        if(success) {
            registerActiveMod(url.split('/').pop(), "Link Externo");
            if(window.NeonCore) NeonCore.notify("Mod Via Link Ativo", "cyan");
        }
    };

    // 5. Ferramentas de Debug
    let showHitboxes = false;
    window.toggleHitboxes = () => {
        showHitboxes = !showHitboxes;
        if(window.NeonCore) NeonCore.notify("Hitboxes: " + (showHitboxes ? "ON" : "OFF"), "magenta");
    };

    // Patch no draw para mostrar hitboxes se ativo
    const originalDraw = window.draw;
    window.draw = function() {
        originalDraw();
        if(showHitboxes) {
            ctx.strokeStyle = "red";
            ctx.lineWidth = 1;
            enemies.forEach(e => {
                ctx.beginPath(); ctx.arc(e.x, e.y, e.radius, 0, Math.PI*2); ctx.stroke();
            });
            ctx.strokeStyle = "cyan";
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.stroke();
        }
    };

    // Atualizador de Stats de Debug
    setInterval(() => {
        if(panel.style.display === 'flex') {
            document.getElementById('engine-stats').innerHTML = `
                Inimigos: ${enemies.length}<br>
                Partículas: ${particles.length}<br>
                Projéteis: ${projectiles.length}<br>
                FPS Est: ${Math.round(60)}
            `;
        }
    }, 1000);

})();
</script>
</body>
</html>
